<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finanças Milionárias</title>
  <meta name="description" content="App de finanças pessoais — controle de receitas, gastos fixos, parcelas, cartões e orçamentos.">
  <meta name="theme-color" content="#0a0a0c">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E✨%3C/text%3E%3C/svg%3E">

  <!-- Tailwind CSS via CDN (JIT, suporta arbitrary values) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..700;1,9..144,400..700&family=Manrope:wght@200..800&family=JetBrains+Mono:wght@400..700&display=swap" rel="stylesheet">

  <style>
    html, body { margin: 0; padding: 0; background: #0a0a0c; color: #e6e8ef; }
    #root { min-height: 100vh; }
    /* Loading inicial enquanto Babel compila */
    .boot-loader {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      font-family: Manrope, system-ui, sans-serif; color: rgba(255,255,255,0.5); font-size: 14px;
      gap: 10px;
    }
    .boot-loader .dot {
      width: 8px; height: 8px; border-radius: 50%; background: #d4af37;
      animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>
  <div id="root">
    <div class="boot-loader">
      <span class="dot"></span>
      <span>Carregando o app…</span>
    </div>
  </div>

  <!-- localStorage como adaptador para a API window.storage (que vem do ambiente Claude) -->
  <script>
    window.storage = {
      async get(key) {
        const v = localStorage.getItem(key);
        if (v === null) throw new Error("Key not found: " + key);
        return { key, value: v, shared: false };
      },
      async set(key, value, shared = false) {
        localStorage.setItem(key, value);
        return { key, value, shared };
      },
      async delete(key, shared = false) {
        localStorage.removeItem(key);
        return { key, deleted: true, shared };
      },
      async list(prefix = "", shared = false) {
        const keys = [];
        for (let i = 0; i < localStorage.length; i++) {
          const k = localStorage.key(i);
          if (!prefix || k.startsWith(prefix)) keys.push(k);
        }
        return { keys, prefix, shared };
      },
    };
  </script>

  <!-- React, ReactDOM, Babel via CDN -->
  <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>

  <!-- Lucide (browser/UMD) — vamos criar wrappers React em runtime -->
  <script src="https://unpkg.com/lucide@0.383.0/dist/umd/lucide.min.js"></script>

  <!-- Cria componentes React a partir dos ícones SVG do lucide -->
  <script>
    (function () {
      const { createElement: h, forwardRef, useMemo } = React;
      const lucide = window.lucide;
      const cache = {};

      // Converte um nome PascalCase ('CheckCircle2') para o snake do lucide ('check-circle-2')
      const toKebab = (s) => s.replace(/([a-z])([A-Z0-9])/g, "$1-$2").replace(/([0-9])([A-Z])/g, "$1-$2").toLowerCase();

      // Pega o array [tag, attrs, children] que o lucide expõe em window.lucide.icons
      // e devolve um componente React equivalente.
      function makeIconComponent(name) {
        if (cache[name]) return cache[name];
        const kebab = toKebab(name);
        const node = lucide.icons[kebab] || lucide.icons[name];
        if (!node) {
          // fallback: caixinha vazia 16x16
          const Fallback = ({ size = 16, ...rest }) =>
            h("svg", { width: size, height: size, viewBox: "0 0 24 24", ...rest });
          cache[name] = Fallback;
          return Fallback;
        }

        // node é um array tipo:
        // ["svg", {attrs base}, [["path", {...}], ["circle", {...}]]]
        const [, baseAttrs, children] = node;

        const Comp = ({ size = 24, color = "currentColor", strokeWidth = 2, className, style, ...rest }) => {
          const finalChildren = (children || []).map((c, i) => {
            const [tag, attrs] = c;
            return h(tag, { key: i, ...attrs });
          });
          return h(
            "svg",
            {
              ...baseAttrs,
              width: size,
              height: size,
              stroke: color,
              strokeWidth,
              className,
              style,
              ...rest,
            },
            ...finalChildren
          );
        };
        Comp.displayName = name;
        cache[name] = Comp;
        return Comp;
      }

      // Expõe um objeto Lucide com todos os ícones que o app vai usar.
      // Deixe registrado também um Proxy pra facilitar:
      window.LucideIcons = new Proxy({}, {
        get(_, prop) {
          if (typeof prop !== "string") return undefined;
          return makeIconComponent(prop);
        },
      });
    })();
  </script>

  <!-- App propriamente dito — JSX compilado pelo Babel -->
  <script type="text/babel" data-presets="react">
    // Hooks e ícones via globals (sem ES modules)
    const { useState, useEffect, useMemo, useRef } = React;
    const {
      LayoutDashboard, Wallet, Receipt, Settings,
      Plus, Trash2, Check, X, ChevronLeft, ChevronRight,
      Sparkles, AlertTriangle, CheckCircle2, Circle, Loader2,
      ArrowUpRight, ArrowDownRight, CreditCard, Users, Target,
      Banknote, Bell, Search, Pencil, Calendar
    } = window.LucideIcons;

    /* === APP CODE BEGIN === */
const STORAGE_KEY = "alquimia-financas:v3";

// ---------- helpers ----------
const uid = () => Math.random().toString(36).slice(2, 11) + Date.now().toString(36).slice(-4);

const fmtBRL = (n) =>
  (Number(n) || 0).toLocaleString("pt-BR", { style: "currency", currency: "BRL" });

const todayISO = () => new Date().toISOString().slice(0, 10);
const todayDay = () => new Date().getDate();

const getCurrentMonth = () => {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`;
};

const formatMonthLabel = (ym) => {
  const [y, m] = ym.split("-");
  const months = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho",
    "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
  return `${months[Number(m) - 1]} ${y}`;
};

const shiftMonth = (ym, delta) => {
  const [y, m] = ym.split("-").map(Number);
  const d = new Date(y, m - 1 + delta, 1);
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`;
};

// Defaults vazios — você adiciona o que quiser nas Configurações.
// Pix e Débito vêm como métodos básicos pois são universais.
const DEFAULT_CARDS = [];
const DEFAULT_PAYMENT_METHODS = ["Pix", "Débito"];
const DEFAULT_CATEGORIES = [];
const DEFAULT_ATTRIBUTED_TO = [];
const DEFAULT_INCOME_SOURCES = [];

const createEmptyMonth = () => ({
  receitas: [],
  despesas: [],
  config: {
    cards: [...DEFAULT_CARDS],
    paymentMethods: [...DEFAULT_PAYMENT_METHODS],
    categories: DEFAULT_CATEGORIES.map(c => ({ ...c })),
    attributedTo: [...DEFAULT_ATTRIBUTED_TO],
    incomeSources: [...DEFAULT_INCOME_SOURCES],
  },
});

// Color tokens
const accents = {
  gold:    { hex: "#d4af37", soft: "rgba(212,175,55,0.14)", glow: "rgba(212,175,55,0.4)"  },
  emerald: { hex: "#10b981", soft: "rgba(16,185,129,0.12)", glow: "rgba(16,185,129,0.35)" },
  rose:    { hex: "#f43f5e", soft: "rgba(244,63,94,0.12)",  glow: "rgba(244,63,94,0.35)" },
  amber:   { hex: "#f59e0b", soft: "rgba(245,158,11,0.12)", glow: "rgba(245,158,11,0.35)" },
  cyan:    { hex: "#06b6d4", soft: "rgba(6,182,212,0.12)",  glow: "rgba(6,182,212,0.35)" },
  violet:  { hex: "#8b5cf6", soft: "rgba(139,92,246,0.12)", glow: "rgba(139,92,246,0.35)" },
  sky:     { hex: "#0ea5e9", soft: "rgba(14,165,233,0.12)", glow: "rgba(14,165,233,0.35)" },
  fuchsia: { hex: "#d946ef", soft: "rgba(217,70,239,0.12)", glow: "rgba(217,70,239,0.35)" },
};

const accentKeys = Object.keys(accents);
const hashAccent = (str) => {
  let h = 0;
  for (let i = 0; i < (str || "").length; i++) h = ((h << 5) - h + str.charCodeAt(i)) | 0;
  return accentKeys[Math.abs(h) % accentKeys.length];
};

// Helpers para o novo schema
const isMineFor = (attributedToName, config) => {
  if (!attributedToName) return true;
  const item = config?.attributedTo?.find?.(a => (a?.name || a) === attributedToName);
  if (!item) return true;
  if (typeof item === "string") return true;
  return item.isMine !== false;
};

const cardDueDayFor = (cardName, config) => {
  const c = config?.cards?.find?.(x => x.name === cardName);
  return c?.dueDay ? Number(c.dueDay) : null;
};

const fmtDate = (d) => {
  if (!(d instanceof Date) || isNaN(d)) return "";
  return d.toLocaleDateString("pt-BR", { day: "2-digit", month: "2-digit", year: "numeric" });
};

// Migração in-place: converte attributedTo de string[] → {name,isMine}[] e
// garante que cartões tenham dueDay opcional. Roda no load.
const migrateData = (data) => {
  if (!data?.months) return data;
  const months = {};
  for (const ym of Object.keys(data.months)) {
    const m = data.months[ym];
    if (!m?.config) { months[ym] = m; continue; }
    const cfg = m.config;
    months[ym] = {
      ...m,
      config: {
        ...cfg,
        attributedTo: (cfg.attributedTo || []).map(a =>
          typeof a === "string" ? { name: a, isMine: true } : a
        ),
        cards: (cfg.cards || []).map(c => ({ dueDay: null, closingDay: null, ...c })),
      },
    };
  }

  let currentMonth = data.currentMonth;

  // Migração one-shot: mover dados de 2026-06 → 2026-05 (pediu pra corrigir uma vez)
  if (!data._fixJun2026ToMay && months["2026-06"]) {
    const may = months["2026-05"];
    const mayEmpty = !may || ((may.despesas?.length || 0) === 0 && (may.receitas?.length || 0) === 0);
    if (mayEmpty) {
      months["2026-05"] = months["2026-06"];
      delete months["2026-06"];
      if (currentMonth === "2026-06") currentMonth = "2026-05";
    }
  }

  return {
    ...data,
    brand: data.brand || { name: "", subtitle: "Finanças Milionárias" },
    months,
    currentMonth,
    _fixJun2026ToMay: true, // marca que já rodou, não roda mais
  };
};

// ---------- root ----------
function App() {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [tab, setTab] = useState("painel");
  const [saving, setSaving] = useState(false);
  const saveTimer = useRef(null);
  const firstLoad = useRef(true);

  useEffect(() => {
    const link = document.createElement("link");
    link.rel = "stylesheet";
    link.href = "https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap";
    document.head.appendChild(link);
    return () => { try { document.head.removeChild(link); } catch {} };
  }, []);

  useEffect(() => {
    (async () => {
      try {
        const result = await window.storage.get(STORAGE_KEY);
        if (result?.value) {
          const parsed = migrateData(JSON.parse(result.value));
          const cm = parsed.currentMonth || getCurrentMonth();
          if (!parsed.months[cm]) parsed.months[cm] = createEmptyMonth();
          setData(parsed);
        } else {
          const cm = getCurrentMonth();
          setData({ currentMonth: cm, brand: { name: "", subtitle: "Finanças Milionárias" }, months: { [cm]: createEmptyMonth() } });
        }
      } catch {
        const cm = getCurrentMonth();
        setData({ currentMonth: cm, brand: { name: "", subtitle: "Finanças Milionárias" }, months: { [cm]: createEmptyMonth() } });
      } finally {
        setLoading(false);
        firstLoad.current = false;
      }
    })();
  }, []);

  useEffect(() => {
    if (loading || !data || firstLoad.current) return;
    setSaving(true);
    if (saveTimer.current) clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(async () => {
      try {
        await window.storage.set(STORAGE_KEY, JSON.stringify(data));
      } catch (e) {
        console.error("Erro ao salvar:", e);
      } finally {
        setSaving(false);
      }
    }, 600);
    return () => clearTimeout(saveTimer.current);
  }, [data, loading]);

  if (loading || !data) {
    return (
      <div style={{ background: "#0a0a0c", minHeight: "100vh", fontFamily: "Manrope, sans-serif" }}
           className="flex items-center justify-center text-white">
        <div className="flex items-center gap-3 opacity-70">
          <Loader2 className="animate-spin" size={20} style={{ color: "#d4af37" }} />
          <span>Carregando…</span>
        </div>
      </div>
    );
  }

  const cm = data.currentMonth;
  const month = data.months[cm];

  const setMonth = (updater) => {
    setData((d) => {
      const newMonth = typeof updater === "function" ? updater(d.months[d.currentMonth]) : updater;
      return { ...d, months: { ...d.months, [d.currentMonth]: newMonth } };
    });
  };

  // Adiciona uma despesa no mês atual e, se for parcelada, cria as parcelas
  // futuras nos próximos meses (criando-os caso não existam ainda).
  const addDespesaPropagated = (despesa) => {
    const total = Number(despesa.installmentTotal) || 1;
    const cur = Number(despesa.installmentCurrent) || 1;
    const futureCount = despesa.recurring ? 0 : Math.max(0, total - cur);

    setData((d) => {
      const months = { ...d.months };
      const cm = d.currentMonth;
      const cfg = months[cm].config;

      // Despesa sempre fica no mês ATUAL (mês da compra). A fatura é calculada
      // dinamicamente no painel — gasto e fatura podem estar em meses diferentes.
      const startYM = cm;

      // helper pra criar mês caso não exista (carregando config + recorrentes)
      const ensureMonth = (ym) => {
        if (months[ym]) return;
        const ref = months[cm];
        const recurring = ref.despesas
          .filter(x => x.recurring)
          .map(x => ({ ...x, id: uid(), paid: false, date: "" }));
        months[ym] = {
          receitas: [],
          despesas: recurring,
          config: JSON.parse(JSON.stringify(ref.config)),
        };
      };

      // 1) adiciona no mês de destino (pode ser o atual ou o próximo)
      ensureMonth(startYM);
      months[startYM] = {
        ...months[startYM],
        despesas: [{ id: uid(), ...despesa }, ...months[startYM].despesas],
      };

      // 2) cria parcelas futuras a partir do mês de destino
      let ym = startYM;
      for (let i = 1; i <= futureCount; i++) {
        ym = shiftMonth(ym, 1);
        ensureMonth(ym);
        const futureDespesa = {
          ...despesa,
          id: uid(),
          paid: false,
          date: "",
          installmentCurrent: cur + i,
        };
        months[ym] = {
          ...months[ym],
          despesas: [futureDespesa, ...months[ym].despesas],
        };
      }

      return { ...d, months };
    });
  };

  const changeMonth = (delta) => {
    const newCm = shiftMonth(cm, delta);
    setData((d) => {
      const months = { ...d.months };
      if (!months[newCm]) {
        const prev = months[d.currentMonth];
        const recurring = prev.despesas
          .filter(x => x.recurring)
          .map(x => ({ ...x, id: uid(), paid: false, date: "" }));
        months[newCm] = {
          receitas: [],
          despesas: recurring,
          config: JSON.parse(JSON.stringify(prev.config)),
        };
      }
      return { ...d, currentMonth: newCm, months };
    });
  };

  return (
    <div style={{
      background: "radial-gradient(circle at 12% 0%, rgba(212,175,55,0.12), transparent 50%), radial-gradient(circle at 88% 100%, rgba(212,175,55,0.06), transparent 45%), #0a0a0c",
      minHeight: "100vh",
      fontFamily: "Manrope, system-ui, sans-serif",
      color: "#e6e8ef"
    }}>
      <div className="max-w-7xl mx-auto px-4 sm:px-6 py-6 sm:py-8">
        <Header
          brand={data.brand}
          updateBrand={(patch) => setData(d => ({ ...d, brand: { ...d.brand, ...patch } }))}
          monthLabel={formatMonthLabel(cm)}
          onPrev={() => changeMonth(-1)}
          onNext={() => changeMonth(1)}
          saving={saving}
        />
        <Tabs tab={tab} setTab={setTab} />
        <div className="mt-6">
          {tab === "painel"   && <PainelTab month={month} setMonth={setMonth} currentMonth={cm} allMonths={data.months} />}
          {tab === "receitas" && <ReceitasTab month={month} setMonth={setMonth} />}
          {tab === "gastos"   && <GastosTab month={month} setMonth={setMonth} addDespesaPropagated={addDespesaPropagated} currentMonth={cm} />}
          {tab === "config"   && <ConfigTab month={month} setMonth={setMonth} brand={data.brand} updateBrand={(patch) => setData(d => ({ ...d, brand: { ...d.brand, ...patch } }))} />}
        </div>
        <Footer />
      </div>
    </div>
  );
}

// ---------- header / tabs ----------
function Header({ brand, updateBrand, monthLabel, onPrev, onNext, saving }) {
  const [editingName, setEditingName] = useState(false);
  const [draftName, setDraftName] = useState(brand?.name || "");

  const saveName = () => {
    updateBrand({ name: draftName.trim() });
    setEditingName(false);
  };

  const displayName = brand?.name?.trim() || "Seu nome aqui";
  const subtitle = brand?.subtitle || "Finanças Milionárias";
  const hasName = !!brand?.name?.trim();

  return (
    <header className="flex flex-col sm:flex-row sm:items-end sm:justify-between gap-4 mb-8">
      <div className="min-w-0">
        {/* Linha de cima — nome (editável) */}
        {editingName ? (
          <div className="flex items-center gap-2 mb-2">
            <input
              autoFocus
              value={draftName}
              onChange={e => setDraftName(e.target.value)}
              onBlur={saveName}
              onKeyDown={e => {
                if (e.key === "Enter") saveName();
                if (e.key === "Escape") { setEditingName(false); setDraftName(brand?.name || ""); }
              }}
              placeholder="Seu nome"
              style={{
                background: "rgba(212,175,55,0.08)",
                border: "1px solid rgba(212,175,55,0.4)",
                color: "#d4af37",
                letterSpacing: "0.25em",
                fontSize: "12px",
              }}
              className="px-3 py-1 rounded-full uppercase tracking-widest focus:outline-none placeholder:text-white/30"
            />
          </div>
        ) : (
          <button
            onClick={() => { setEditingName(true); setDraftName(brand?.name || ""); }}
            style={{ letterSpacing: "0.25em", color: "#d4af37" }}
            className={`group flex items-center gap-2 text-xs uppercase mb-2 hover:opacity-80 transition ${!hasName ? "opacity-60" : ""}`}
          >
            <Sparkles size={12} />
            <span>{displayName}</span>
            <Pencil size={10} className="opacity-0 group-hover:opacity-60 transition" />
          </button>
        )}

        {/* Título — Finanças Milionárias com gradient dourado */}
        <h1 style={{ fontFamily: "Fraunces, serif", fontWeight: 500, letterSpacing: "-0.02em" }}
            className="text-4xl sm:text-5xl text-white">
          {(() => {
            const parts = subtitle.trim().split(/\s+/);
            if (parts.length < 2) {
              return (
                <em style={{
                  fontStyle: "italic",
                  background: "linear-gradient(90deg,#f4d676,#d4af37,#a87f1f)",
                  WebkitBackgroundClip: "text",
                  color: "transparent",
                }}>{subtitle}.</em>
              );
            }
            const last = parts.pop();
            const head = parts.join(" ");
            return (
              <>
                {head}{" "}
                <em style={{
                  fontStyle: "italic",
                  background: "linear-gradient(90deg,#f4d676,#d4af37,#a87f1f)",
                  WebkitBackgroundClip: "text",
                  color: "transparent",
                }}>{last}.</em>
              </>
            );
          })()}
        </h1>
      </div>
      <div className="flex items-center gap-3">
        {saving && (
          <div className="flex items-center gap-1.5 text-xs text-white/40">
            <Loader2 size={12} className="animate-spin" style={{ color: "#d4af37" }} />
            <span>salvando</span>
          </div>
        )}
        <div className="flex items-center gap-1 rounded-full p-1 backdrop-blur"
             style={{ background: "rgba(212,175,55,0.06)", border: "1px solid rgba(212,175,55,0.2)" }}>
          <button onClick={onPrev} className="p-1.5 rounded-full hover:bg-white/10 transition" aria-label="Anterior">
            <ChevronLeft size={16} />
          </button>
          <span className="px-3 text-sm font-medium tabular-nums whitespace-nowrap">{monthLabel}</span>
          <button onClick={onNext} className="p-1.5 rounded-full hover:bg-white/10 transition" aria-label="Próximo">
            <ChevronRight size={16} />
          </button>
        </div>
      </div>
    </header>
  );
}

function Footer() {
  return (
    <div className="mt-16 pt-8 border-t border-white/5 text-center text-xs text-white/30">
      Os dados são salvos automaticamente no seu navegador.
    </div>
  );
}

function Tabs({ tab, setTab }) {
  const items = [
    { id: "painel",   label: "Painel",        icon: LayoutDashboard },
    { id: "receitas", label: "Receitas",      icon: Wallet },
    { id: "gastos",   label: "Gastos",        icon: Receipt },
    { id: "config",   label: "Configurações", icon: Settings },
  ];
  return (
    <nav className="flex gap-1 overflow-x-auto pb-1 -mx-1 px-1">
      {items.map((it) => {
        const Icon = it.icon;
        const active = tab === it.id;
        return (
          <button
            key={it.id}
            onClick={() => setTab(it.id)}
            className={`flex items-center gap-2 px-4 py-2.5 rounded-xl text-sm font-medium whitespace-nowrap transition-all ${
              active
                ? "bg-white/10 text-white border border-white/15 shadow-lg"
                : "text-white/55 hover:text-white hover:bg-white/5 border border-transparent"
            }`}
          >
            <Icon size={15} />
            {it.label}
          </button>

// MoneyInput — formato calculadora: digita centavos e a vírgula entra automaticamente.
// Ex: digita "815500" → mostra "8.155,00". value sempre é um número (em reais).
function MoneyInput({ value, onChange, placeholder, className = "", style = {}, autoFocus }) {
  // Formata um valor (Number em reais) para BR sem o "R$ "
  const formatBR = (n) => {
    if (n === "" || n === null || n === undefined || isNaN(n)) return "";
    return Number(n).toLocaleString("pt-BR", {
      minimumFractionDigits: 2,
      maximumFractionDigits: 2,
    });
  };

  const handleChange = (e) => {
    // Pega só os dígitos do que foi digitado
    const digits = e.target.value.replace(/\D/g, "");
    if (digits === "") {
      onChange("");
      return;
    }
    // Os dígitos representam centavos. Ex: "815500" = 8155.00
    const cents = parseInt(digits, 10);
    const reais = cents / 100;
    onChange(reais);
  };

  const display = value === "" || value === null || value === undefined ? "" : formatBR(value);

  return (
    <div className="relative" style={{ width: "100%" }}>
      <span style={{
        position: "absolute",
        left: 12,
        top: "50%",
        transform: "translateY(-50%)",
        color: "rgba(255,255,255,0.4)",
        fontSize: "14px",
        pointerEvents: "none",
        fontFamily: "JetBrains Mono, monospace",
      }}>R$</span>
      <input
        type="text"
        inputMode="numeric"
        value={display}
        onChange={handleChange}
        autoFocus={autoFocus}
        placeholder={placeholder || "0,00"}
        style={{
          background: "rgba(255,255,255,0.03)",
          border: "1px solid rgba(255,255,255,0.08)",
          color: "white",
          outline: "none",
          width: "100%",
          minWidth: 0,
          boxSizing: "border-box",
          paddingLeft: 36,
          fontFamily: "JetBrains Mono, monospace",
          ...style,
        }}
        className={`px-3 py-2 rounded-lg text-sm placeholder:text-white/30 focus:border-amber-400 transition tabular-nums ${className}`}
      />
    </div>
  );
}

// ---------- aggregations ----------
function useMonthAggregates(month, currentYM, allMonths) {
  return useMemo(() => {
    const cfg = month.config;
    const cardNames = cfg.cards.map(c => c.name);

    // Despesas separadas: minhas vs de terceiros
    const minhas = month.despesas.filter(d => isMineFor(d.attributedTo, cfg));
    const terceiros = month.despesas.filter(d => !isMineFor(d.attributedTo, cfg));

    const totalReceitas = month.receitas.reduce((s, r) => s + Number(r.amount || 0), 0);

    // Despesas, total pago, saldo — só consideram MINHAS
    const totalDespesas = minhas.reduce((s, d) => s + Number(d.amount || 0), 0);
    const totalPago = minhas.filter(d => d.paid).reduce((s, d) => s + Number(d.amount || 0), 0);
    const totalAPagar = totalDespesas - totalPago;
    const sobra = totalReceitas - totalDespesas;

    // A receber de terceiros (não ressarcidos)
    const aReceber = terceiros.filter(d => !d.reimbursed);
    const totalAReceber = aReceber.reduce((s, d) => s + Number(d.amount || 0), 0);
    // agrupa por pessoa
    const aReceberByPessoa = {};
    aReceber.forEach(d => {
      const k = d.attributedTo || "—";
      aReceberByPessoa[k] = aReceberByPessoa[k] || { name: k, total: 0, items: [] };
      aReceberByPessoa[k].total += Number(d.amount || 0);
      aReceberByPessoa[k].items.push(d);
    });
    const aReceberList = Object.values(aReceberByPessoa).sort((a, b) => b.total - a.total);

    // Pagamentos — só minhas pra cálculos do painel
    const byPayment = {};
    cfg.paymentMethods.forEach(pm => { byPayment[pm] = 0; });
    minhas.forEach(d => {
      const k = d.paymentMethod || "—";
      byPayment[k] = (byPayment[k] || 0) + Number(d.amount || 0);
    });

    // Faturas dos cartões no mês corrente: só os gastos lançados nesse mês.
    const byCard = cfg.cards.map(c => {
      const items = minhas.filter(d => d.paymentMethod === c.name);
      const total = items.reduce((s, d) => s + Number(d.amount || 0), 0);
      const aPagar = items.filter(d => !d.paid).reduce((s, d) => s + Number(d.amount || 0), 0);
      return {
        name: c.name,
        accent: c.accent,
        dueDay: c.dueDay ? Number(c.dueDay) : null,
        total,
        aPagar,
        count: items.length,
        items,
      };
    }).filter(c => c.count > 0 || c.total > 0);
    const totalCards = byCard.reduce((s, c) => s + c.total, 0);

    const cashMethods = cfg.paymentMethods.filter(pm => !cardNames.includes(pm));
    const aVista = cashMethods.map(m => ({ name: m, total: byPayment[m] || 0 })).filter(m => m.total > 0);
    const totalAVista = aVista.reduce((s, m) => s + m.total, 0);

    // Atribuído a — só atribuídos meus
    const myAttributed = cfg.attributedTo.filter(a => a?.isMine !== false);
    const byAttributed = {};
    myAttributed.forEach(a => { byAttributed[a.name] = 0; });
    minhas.forEach(d => {
      const k = d.attributedTo || "—";
      byAttributed[k] = (byAttributed[k] || 0) + Number(d.amount || 0);
    });
    const attributedList = Object.entries(byAttributed)
      .map(([name, total]) => ({ name, total }))
      .sort((a, b) => b.total - a.total);

    // Categorias — só minhas
    const byCategory = {};
    cfg.categories.forEach(c => { byCategory[c.name] = 0; });
    minhas.forEach(d => {
      const k = d.category || "Sem categoria";
      byCategory[k] = (byCategory[k] || 0) + Number(d.amount || 0);
    });
    const categoryList = cfg.categories.map(c => ({
      ...c, spent: byCategory[c.name] || 0,
    }));

    // Quanto ainda está "reservado" em orçamentos não consumidos
    // (somente categorias com orçamento). Se já gastou mais do que o budget,
    // não há reserva extra (gasto excedente já foi contabilizado em totalDespesas).
    const orcamentoReservado = categoryList
      .filter(c => c.budget && c.budget > 0)
      .reduce((s, c) => s + Math.max(0, c.budget - c.spent), 0);

    // Disponível pra gastar com OUTRAS coisas, considerando que os orçamentos
    // serão totalmente consumidos.
    const disponivel = sobra - orcamentoReservado;

    return {
      totalReceitas, totalDespesas, sobra, totalCards, totalAVista,
      totalPago, totalAPagar, totalAReceber,
      orcamentoReservado, disponivel,
      byCard, aVista, attributedList, categoryList,
      aReceberList, terceirosCount: terceiros.length,
    };
  }, [month, currentYM, allMonths]);
}

// ---------- PAINEL ----------
function HeroBalance({ agg }) {
  const semDados = agg.totalReceitas === 0 && agg.totalDespesas === 0;
  const temReserva = agg.orcamentoReservado > 0;

  // Cor é definida pelo "Disponível" — se ele é negativo, o usuário está em risco
  // mesmo que a sobra real ainda seja positiva (porque tem orçamento por gastar).
  const valorPrimario = temReserva ? agg.disponivel : agg.sobra;
  const positivo = valorPrimario >= 0;
  const heroColor = positivo ? accents.emerald : accents.rose;

  // Label primário muda dependendo se há orçamentos
  const labelPrimario = temReserva
    ? (positivo ? "Disponível pra gastar" : "Vai estourar o mês")
    : (positivo ? "Sobra do mês" : "Estouro do mês");

  return (
    <Card className="p-6 sm:p-8 relative overflow-hidden"
          style={{
            background: `linear-gradient(135deg, ${heroColor.soft}, rgba(255,255,255,0.02) 60%)`,
            border: `1px solid ${heroColor.hex}30`,
            boxShadow: `0 20px 60px -25px ${heroColor.glow}`,
          }}>
      <div className="absolute -right-20 -top-20 w-64 h-64 rounded-full pointer-events-none"
           style={{ background: `radial-gradient(circle, ${heroColor.hex}22, transparent 70%)` }} />
      <div className="relative">
        <div className="flex items-center gap-2 text-xs uppercase text-white/55 mb-3"
             style={{ letterSpacing: "0.22em" }}>
          <Sparkles size={12} style={{ color: heroColor.hex }} />
          <span>{labelPrimario}</span>
        </div>
        <div style={{
               fontFamily: "Fraunces, serif",
               fontWeight: 500,
               letterSpacing: "-0.03em",
               color: heroColor.hex,
             }}
             className="text-5xl sm:text-6xl tabular-nums leading-none">
          {fmtBRL(Math.abs(valorPrimario))}
        </div>

        {semDados ? (
          <div className="text-sm text-white/55 mt-3">
            Adicione receitas e gastos pra ver o quanto sobra
          </div>
        ) : temReserva ? (
          <div className="mt-4 space-y-2">
            <div className="text-sm text-white/65">
              {positivo
                ? <>Pode gastar livre com coisas <em>fora</em> dos orçamentos.</>
                : <>Vai faltar mesmo gastando só o que tá orçado. Considere ajustar.</>}
            </div>
            {/* Breakdown */}
            <div className="grid grid-cols-1 sm:grid-cols-3 gap-3 mt-4 pt-4 border-t border-white/8">
              <BreakdownItem
                label="Sobra real"
                value={agg.sobra}
                hint="receita − gastos lançados"
                emphasis
              />
              <BreakdownItem
                label="Reservado em orçamentos"
                value={-agg.orcamentoReservado}
                hint="ainda não gasto"
                accent="amber"
              />
              <BreakdownItem
                label="Disponível"
                value={agg.disponivel}
                hint="o que sobra de verdade"
                accent={positivo ? "emerald" : "rose"}
                emphasis
              />
            </div>
          </div>
        ) : (
          <div className="text-sm text-white/55 mt-3">
            {positivo
              ? `${fmtBRL(agg.totalReceitas)} de receita − ${fmtBRL(agg.totalDespesas)} de despesa`
              : `Despesa de ${fmtBRL(agg.totalDespesas)} passou da receita de ${fmtBRL(agg.totalReceitas)}`}
          </div>
        )}
      </div>
    </Card>
  );
}

function BreakdownItem({ label, value, hint, accent, emphasis }) {
  const isNegative = value < 0;
  const c = accent ? accents[accent] : null;

      {hint && <div className="text-xs text-white/40 mt-0.5">{hint}</div>}
    </div>
  );
}

function PainelTab({ month, setMonth, currentMonth, allMonths }) {
  const agg = useMonthAggregates(month, currentMonth, allMonths);

  const updateCategory = (name, patch) => {
    setMonth(m => ({
      ...m,
      config: {
        ...m.config,
        categories: m.config.categories.map(c => c.name === name ? { ...c, ...patch } : c),
      },
    }));
  };

  // Lança um gasto rápido (do orçamento). Usa defaults sensatos: hoje, primeiro
  // pagamento, primeiro atribuído (que é meu), pago, descrição = nome da categoria.
  const addQuickDespesa = ({ category, amount }) => {
    setMonth(m => {
      const myAttrs = m.config.attributedTo.filter(a => a.isMine !== false);
      const attributedTo = myAttrs[0]?.name || m.config.attributedTo[0]?.name || "";
      return {
        ...m,
        despesas: [{
          id: uid(),
          description: category,
          amount,
          date: todayISO(),
          category,
          paymentMethod: m.config.paymentMethods[0] || "",
          attributedTo,
          paid: true,
          dueDay: null,
          installmentCurrent: 1, installmentTotal: 1,
          recurring: false,
        }, ...m.despesas],
      };
    });
  };

  const showCards = agg.byCard.length > 0;
  const showAttributed = agg.attributedList.some(a => a.total > 0);
  const showBudgets = agg.categoryList.some(c => c.budget);
  const showCash = agg.aVista.length > 0 && agg.totalAVista > 0;

  return (
    <div className="space-y-6">
      {/* Hero — Disponível pra gastar (com sobra real ao lado) */}
      <HeroBalance agg={agg} />

      {/* Métricas secundárias */}
      <div className="grid grid-cols-2 lg:grid-cols-4 gap-3 sm:gap-4">
        <MetricCard label="Receitas" value={fmtBRL(agg.totalReceitas)} icon={ArrowUpRight} accent="emerald"
                    sub={`${month.receitas.length} entrada(s)`} />
        <MetricCard label="Despesas" value={fmtBRL(agg.totalDespesas)} icon={ArrowDownRight} accent="rose"
                    sub={agg.terceirosCount > 0 ? `só as suas (${agg.terceirosCount} de terceiros à parte)` : `${month.despesas.length} gasto(s)`} />
        <MetricCard label="Já pago" value={fmtBRL(agg.totalPago)} icon={CheckCircle2} accent="cyan"
                    sub={agg.totalDespesas > 0 ? `${Math.round(agg.totalPago / agg.totalDespesas * 100)}% das despesas` : "—"} />
        <MetricCard label="A pagar" value={fmtBRL(agg.totalAPagar)} icon={Bell} accent="amber"
                    sub={agg.totalAPagar > 0 ? "ainda pendente" : "tudo em dia 🎯"} />
      </div>

      {/* Painéis (só mostra os que tem conteúdo) */}
      {(showCards || showAttributed || showBudgets || showCash || showAReceber || month.despesas.length > 0) && (
        <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
          <BillsReminderPanel month={month} setMonth={setMonth} />
          {showCards && <CardsPanel cards={agg.byCard} setMonth={setMonth} />}
          {showAReceber && <AReceberPanel list={agg.aReceberList} total={agg.totalAReceber} setMonth={setMonth} />}
          {showBudgets && <BudgetCategoriesPanel categories={agg.categoryList.filter(c => c.budget)} addQuickDespesa={addQuickDespesa} />}
          {showCash && <CashPanel aVista={agg.aVista} total={agg.totalAVista} />}
          {showAttributed && <AttributedPanel list={agg.attributedList} total={agg.totalDespesas} />}
        </div>
      )}
    </div>
  );
}

function CardsPanel({ cards, setMonth }) {
  const totalAPagar = cards.reduce((s, c) => s + c.aPagar, 0);
  const today = todayDay();

  const sorted = [...cards].sort((a, b) => {
    if (!a.dueDay && !b.dueDay) return b.total - a.total;
    if (!a.dueDay) return 1;
    if (!b.dueDay) return -1;
    // Ordena por proximidade do vencimento dentro do mês
    const da = a.dueDay >= today ? a.dueDay - today : 100 + a.dueDay;
    const db = b.dueDay >= today ? b.dueDay - today : 100 + b.dueDay;
    return da - db;
  });

  const markFaturaPaga = (cardName, items) => {
    const ids = new Set((items || []).map(i => i.id));
    setMonth(m => ({
      ...m,
      despesas: m.despesas.map(d => ids.has(d.id) ? { ...d, paid: true } : d),
    }));
  };
  const markFaturaPendente = (cardName, items) => {
    const ids = new Set((items || []).map(i => i.id));
    setMonth(m => ({
      ...m,
      despesas: m.despesas.map(d => ids.has(d.id) ? { ...d, paid: false } : d),
    }));
  };

  return (
    <Card className="p-4 sm:p-6" accent="violet">
      <SectionTitle icon={CreditCard} title="Faturas dos cartões"
                    subtitle={totalAPagar > 0 ? `${fmtBRL(totalAPagar)} a pagar` : "tudo quitado"} accent="violet" />
      {cards.length === 0 ? <Empty text="Nenhuma despesa em cartão neste mês" /> : (
        <div className="space-y-3">
          {sorted.map(c => {
            const a = accents[c.accent] || accents.cyan;
            const overdue = c.dueDay && c.dueDay < today && c.aPagar > 0;
            const isToday = c.dueDay === today && c.aPagar > 0;
            const pct = c.total > 0 ? ((c.total - c.aPagar) / c.total) * 100 : 0;
            const isPaid = c.aPagar === 0 && c.total > 0;

            const dueMsg = !c.dueDay ? "sem vencimento cadastrado"
              : overdue ? `vencida no dia ${c.dueDay}`
              : isToday ? `vence HOJE (dia ${c.dueDay})`
              : `vence dia ${c.dueDay}`;
            const dueColor = overdue ? "text-rose-400"
              : isToday ? "text-amber-300"
              : "text-white/55";

            return (
              <div key={c.name} className="p-3 rounded-lg" style={{ background: "rgba(255,255,255,0.025)" }}>
                <div className="flex items-center justify-between gap-2 mb-2">
                  <div className="flex items-center gap-2.5 min-w-0">
                    <div style={{ background: a.soft, color: a.hex }} className="p-1.5 rounded-md shrink-0">
                      <CreditCard size={14} />
                    </div>
                    <div className="min-w-0">
                      <div className="font-medium truncate">{c.name}</div>
                      <div className={`text-xs flex items-center gap-1 ${dueColor}`}>
                        <Calendar size={10} />
                        {dueMsg}
                      </div>
                    </div>
                  </div>
                  <div className="text-right shrink-0">
                    <div style={{ fontFamily: "JetBrains Mono, monospace", color: isPaid ? accents.emerald.hex : (overdue ? accents.rose.hex : a.hex) }}
                         className="font-semibold tabular-nums">
                      {fmtBRL(c.total)}
                    </div>
                    <div className="uppercase text-white/40" style={{ letterSpacing: "0.1em", fontSize: "10px" }}>
                      fatura
                    </div>
                  </div>
                </div>
                {c.total > 0 && (
                  <div className="h-1 rounded-full overflow-hidden mb-2" style={{ background: "rgba(255,255,255,0.05)" }}>
                    <div className="h-full"
                         style={{ width: `${pct}%`, background: isPaid ? accents.emerald.hex : a.hex }} />
                  </div>
                )}
                <div className="flex items-center justify-between text-xs">
                  <span className="text-white/45">
                    {isPaid
                      ? "fatura paga ✓"
                      : c.aPagar < c.total
                        ? `${fmtBRL(c.aPagar)} ainda em aberto`
                        : `${c.count} compra${c.count !== 1 ? "s" : ""} no mês`}
                  </span>
                  {isPaid ? (
                    <button onClick={() => markFaturaPendente(c.name, c.items)}
                            className="text-white/45 hover:text-white/70 transition">
                      desfazer
                    </button>
                  ) : (
                    <button onClick={() => markFaturaPaga(c.name, c.items)}
                            className="px-2.5 py-1 rounded-md text-emerald-300 bg-emerald-500/10 hover:bg-emerald-500/20 transition flex items-center gap-1">
                      <Check size={11} /> Fatura paga
                    </button>
                  )}
                </div>
              </div>
            );
          })}
        </div>
      )}
    </Card>
  );
}

function GastosTab({ month, setMonth, addDespesaPropagated, currentMonth }) {
  const [adding, setAdding] = useState(false);
  const [editing, setEditing] = useState(null);
  // Filtros: arrays de strings selecionadas em cada dimensão (multi-select com OR)
  const [filters, setFilters] = useState({
    paymentMethods: [],
    categories: [],
    attributedTo: [],
  });
  const cfg = month.config;

  // só despesas minhas aparecem nas seções de fixos e eventuais.
  // gastos de terceiros aparecem no painel "A receber" no Painel.
  const minhas = useMemo(
    () => month.despesas.filter(d => isMineFor(d.attributedTo, cfg)),
    [month.despesas, cfg]
  );
  const terceirosCount = month.despesas.length - minhas.length;

  // Valores que efetivamente aparecem nos gastos do mês — só esses viram chips
  const usedValues = useMemo(() => {
    const pm = new Set(), cat = new Set(), att = new Set();
    minhas.forEach(d => {
      if (d.paymentMethod) pm.add(d.paymentMethod);
      if (d.category) cat.add(d.category);
      if (d.attributedTo) att.add(d.attributedTo);
    });
    return {
      paymentMethods: [...pm],
      categories: [...cat],
      attributedTo: [...att],
    };
  }, [minhas]);

  // Aplica filtros (intersecção entre dimensões; OR dentro de cada dimensão)
  const filtered = useMemo(() => {
    return minhas.filter(d => {
      if (filters.paymentMethods.length > 0 && !filters.paymentMethods.includes(d.paymentMethod)) return false;
      if (filters.categories.length > 0 && !filters.categories.includes(d.category)) return false;
      if (filters.attributedTo.length > 0 && !filters.attributedTo.includes(d.attributedTo)) return false;
      return true;
    });
  }, [minhas, filters]);

  const totalFiltros = filters.paymentMethods.length + filters.categories.length + filters.attributedTo.length;
  const filterActive = totalFiltros > 0;

  const toggleFilter = (dim, val) => {
    setFilters(f => {
      const arr = f[dim] || [];
      return { ...f, [dim]: arr.includes(val) ? arr.filter(x => x !== val) : [...arr, val] };
    });
  };
  const clearFilters = () => setFilters({ paymentMethods: [], categories: [], attributedTo: [] });

  const fixos = useMemo(() => {
    return filtered.filter(d => d.recurring).sort((a, b) => {
      // pendentes primeiro, depois ordem por dia de vencimento se tiver
      if (a.paid !== b.paid) return a.paid ? 1 : -1;
      const da = a.dueDay ?? 99;
      const db = b.dueDay ?? 99;
      return da - db;
    });
  }, [filtered]);

  const eventuais = useMemo(() => {
    return filtered.filter(d => !d.recurring).sort((a, b) => {
      if (a.paid !== b.paid) return a.paid ? 1 : -1;
      if (!a.date && !b.date) return 0;
      if (!a.date) return 1;
      if (!b.date) return -1;
      return b.date.localeCompare(a.date);
    });
  }, [filtered]);

  const sumFixos = fixos.reduce((s, d) => s + Number(d.amount || 0), 0);
  const sumFixosPagos = fixos.filter(d => d.paid).reduce((s, d) => s + Number(d.amount || 0), 0);
  const sumEventuais = eventuais.reduce((s, d) => s + Number(d.amount || 0), 0);
  const sumEventuaisPagos = eventuais.filter(d => d.paid).reduce((s, d) => s + Number(d.amount || 0), 0);

  const noConfig = cfg.categories.length === 0 && cfg.attributedTo.length === 0 && cfg.cards.length === 0;

  const addDespesa = (d) => {
    if (addDespesaPropagated) {
      addDespesaPropagated(d);
    } else {
      setMonth(m => ({ ...m, despesas: [{ id: uid(), ...d }, ...m.despesas] }));
    }
    setAdding(false);
  };
  const updateDespesa = (id, patch) => {
    setMonth(m => ({ ...m, despesas: m.despesas.map(d => d.id === id ? { ...d, ...patch } : d) }));
  };
  const removeDespesa = (id) => {
    setMonth(m => ({ ...m, despesas: m.despesas.filter(d => d.id !== id) }));
  };

  return (
    <div className="space-y-6">
      {/* botão e form */}
      <div className="flex items-center justify-between gap-3 flex-wrap">
        <div>
          <h2 style={{ fontFamily: "Fraunces, serif", fontWeight: 500, letterSpacing: "-0.01em" }}
              className="text-2xl">Gastos do mês</h2>
          <p className="text-sm text-white/50 mt-1">
            {month.despesas.length === 0
              ? "Nenhum gasto ainda. Clique em \"Novo gasto\" pra começar."
              : filterActive
                ? `Mostrando ${fixos.length + eventuais.length} de ${minhas.length} (filtrado) · ${fmtBRL(sumFixos + sumEventuais)}`
                : `${fixos.length} fixo(s) · ${eventuais.length} eventual(is)${terceirosCount > 0 ? ` · ${terceirosCount} de terceiros (no Painel)` : ""} · ${fmtBRL(sumFixos + sumEventuais)} é seu`}
          </p>
        </div>
        <Btn icon={adding ? X : Plus} onClick={() => setAdding(!adding)}>{adding ? "Fechar" : "Novo gasto"}</Btn>
      </div>

      {adding && <DespesaForm config={cfg} currentMonth={currentMonth} onSubmit={addDespesa} onCancel={() => setAdding(false)} />}

      {minhas.length > 0 && (
        <FilterBar
          used={usedValues}
          filters={filters}
          toggleFilter={toggleFilter}
          clearFilters={clearFilters}
          totalFiltros={totalFiltros}
          config={cfg}
        />
      )}

      {noConfig && month.despesas.length === 0 && !adding && (
        <Card className="p-5" accent="violet">
          <div className="flex items-start gap-3">
            <Sparkles size={18} className="text-amber-300 mt-0.5" />
            <div className="text-sm text-white/75">
              Antes de lançar, talvez queira passar nas <strong>Configurações</strong>: cadastrar seus cartões (Safra, Nubank…),
              quem atribui os gastos (Eu, Casal, Pai…) e seus orçamentos mensais (Mercado, Saídas…).
              Mas pode lançar do jeito que tá também — esses campos são opcionais.
            </div>
          </div>
        </Card>
      )}

      {/* Card 1: Gastos fixos */}
      <Card className="p-5 sm:p-6" accent="violet" glow>
        <SectionTitle
          icon={Calendar}
          title="Gastos fixos"
          subtitle={
            fixos.length === 0
              ? (filterActive
                  ? "Nenhum fixo bate com os filtros"
                  : "Marque um gasto como \"Gasto fixo\" e ele aparece aqui — e se repete todo mês")
              : `${fixos.filter(d => !d.paid).length} pendente(s) de ${fixos.length} · ${fmtBRL(sumFixosPagos)} pago / ${fmtBRL(sumFixos - sumFixosPagos)} a pagar`
          }
          accent="violet"
          action={
            !filterActive && fixos.some(d => !d.paid) && (
              <Btn variant="ghost" size="sm" icon={CheckCircle2}
                   onClick={() => {
                     setMonth(m => ({
                       ...m,
                       despesas: m.despesas.map(d =>
                         d.recurring && !d.paid && isMineFor(d.attributedTo, m.config)
                           ? { ...d, paid: true } : d
                       ),
                     }));
                   }}>
                Marcar todos pagos
              </Btn>
            )
          }
        />

        {fixos.length === 0 ? (
          <Empty text={filterActive ? "—" : "Nenhum gasto fixo neste mês"} />
        ) : (
          <div className="space-y-1.5">
            {fixos.map(d => (
              <DespesaRow
                key={d.id}
                d={d}
                config={cfg}
                onTogglePaid={() => updateDespesa(d.id, { paid: !d.paid })}
                onEdit={() => setEditing(d)}
                onRemove={() => removeDespesa(d.id)}
              />
            ))}
            <div className="border-t border-white/5 mt-3 pt-3 flex items-center justify-between text-sm">
              <span className="text-white/50">Total de fixos</span>
              <span style={{ fontFamily: "JetBrains Mono, monospace" }} className="font-semibold tabular-nums">
                {fmtBRL(sumFixos)}
              </span>
            </div>
          </div>
        )}
      </Card>

      {/* Card 2: Gastos eventuais */}
      <Card className="p-5 sm:p-6" accent="cyan">
        <SectionTitle
          icon={Receipt}
          title="Gastos eventuais"
          subtitle={
            eventuais.length === 0
              ? (filterActive
                  ? "Nenhum eventual bate com os filtros"
                  : "Compras, parcelas, presentes — tudo que aparece só esse mês")
              : `${eventuais.filter(d => !d.paid).length} pendente(s) de ${eventuais.length} · ${fmtBRL(sumEventuaisPagos)} pago / ${fmtBRL(sumEventuais - sumEventuaisPagos)} a pagar`
          }
          accent="cyan"
        />

        {eventuais.length === 0 ? (
          <Empty text={filterActive ? "—" : "Nenhum gasto eventual neste mês"} />
        ) : (
          <div className="space-y-1.5">
            {eventuais.map(d => (
              <DespesaRow
                key={d.id}
                d={d}
                config={cfg}
                onTogglePaid={() => updateDespesa(d.id, { paid: !d.paid })}
                onEdit={() => setEditing(d)}
                onRemove={() => removeDespesa(d.id)}
              />
            ))}
            <div className="border-t border-white/5 mt-3 pt-3 flex items-center justify-between text-sm">
              <span className="text-white/50">Total de eventuais</span>
              <span style={{ fontFamily: "JetBrains Mono, monospace" }} className="font-semibold tabular-nums">
                {fmtBRL(sumEventuais)}
              </span>
            </div>
          </div>
        )}
      </Card>

      {editing && (
        <EditDespesaModal
          despesa={editing}
          config={cfg}
          onSave={(patch) => { updateDespesa(editing.id, patch); setEditing(null); }}
          onClose={() => setEditing(null)}
        />
      )}
    </div>
  );
}

function FilterBar({ used, filters, toggleFilter, clearFilters, totalFiltros, config }) {
  // Resolver acento de uma forma de pagamento (cartão tem cor configurada;
  // Pix/Débito têm cores fixas; outros usam hash)
  const pmAccent = (name) => {
    const card = config.cards.find(c => c.name === name);
    if (card?.accent) return card.accent;
    if (name === "Pix") return "emerald";
    if (name === "Débito") return "sky";
    return hashAccent(name);
  };
  const catAccent = (name) => {
    const cat = config.categories.find(c => c.name === name);
    return cat?.accent || hashAccent(name);
  };
  const attAccent = (name) => hashAccent(name);

  const Section = ({ label, dim, items, accentFn, icon: Icon }) => {
    if (!items || items.length === 0) return null;
    return (
      <div className="flex items-center gap-2 flex-wrap">
        <div className="flex items-center gap-1.5 shrink-0 mr-1">
          <Icon size={11} className="text-white/35" />
          <span className="uppercase text-white/40"
                style={{ fontSize: "10px", letterSpacing: "0.1em" }}>
            {label}
          </span>
        </div>
        {items.map(name => {
          const a = accents[accentFn(name)] || accents.gold;
          const sel = filters[dim].includes(name);
          return (
            <button
              key={name}
              onClick={() => toggleFilter(dim, name)}
              className="px-2.5 py-1 rounded-full text-xs transition flex items-center gap-1"
              style={{
                background: sel ? a.hex : a.soft,
                color: sel ? "#0a0a0c" : a.hex,
                border: sel ? `1px solid ${a.hex}` : `1px solid ${a.hex}30`,
                fontWeight: sel ? 600 : 400,
              }}
            >
              {sel && <Check size={11} />}
              {name}
            </button>
          );
        })}
      </div>
    );
  };

  return (
    <Card className="p-3 sm:p-4">
      <div className="flex items-center justify-between gap-2 mb-2">
        <div className="flex items-center gap-2 text-xs text-white/55">
          <Search size={12} />
          <span className="uppercase" style={{ letterSpacing: "0.12em" }}>
            Filtrar
          </span>
          {totalFiltros > 0 && (
            <span className="px-1.5 rounded-full text-xs"
                  style={{ background: accents.gold.soft, color: accents.gold.hex, fontSize: "10px" }}>
              {totalFiltros} ativo{totalFiltros > 1 ? "s" : ""}
            </span>
          )}
        </div>
        {totalFiltros > 0 && (
          <button onClick={clearFilters}
                  className="text-xs text-white/55 hover:text-white transition flex items-center gap-1">
            <X size={11} /> limpar
          </button>
        )}
      </div>

      <div className="space-y-2">
        <Section label="Pagamento" dim="paymentMethods" items={used.paymentMethods}
                 accentFn={pmAccent} icon={Banknote} />
        <Section label="Categoria" dim="categories" items={used.categories}
                 accentFn={catAccent} icon={Target} />
        <Section label="Atribuído" dim="attributedTo" items={used.attributedTo}
                 accentFn={attAccent} icon={Users} />
      </div>
    </Card>
  );
}

function DespesaRow({ d, config, onTogglePaid, onEdit, onRemove }) {
  const cardObj = config.cards.find(c => c.name === d.paymentMethod);
  const catObj = config.categories.find(c => c.name === d.category);
  const pmAccent = cardObj?.accent
    || (d.paymentMethod === "Pix" ? "emerald"
        : d.paymentMethod === "Débito" ? "sky"
        : d.paymentMethod ? hashAccent(d.paymentMethod) : "sky");
  const pmA = accents[pmAccent];
  const catA = catObj ? accents[catObj.accent] : null;
  const attA = d.attributedTo ? accents[hashAccent(d.attributedTo)] : null;

  const today = todayDay();
  const dueDayN = d.dueDay ? Number(d.dueDay) : null;
  const overdue = !d.paid && dueDayN && dueDayN < today;
  const dueToday = !d.paid && dueDayN === today;

  let bg = d.paid ? "rgba(255,255,255,0.02)" : "rgba(255,255,255,0.04)";
  let border = "1px solid transparent";
  if (overdue) {
    bg = "rgba(244,63,94,0.06)";
    border = `1px solid ${accents.rose.hex}40`;
  } else if (dueToday) {
    bg = "rgba(245,158,11,0.06)";
    border = `1px solid ${accents.amber.hex}40`;
  }

  return (
    <div className="flex items-center gap-3 py-2.5 px-3 rounded-lg group transition"
         style={{
           background: bg,
           border,
           opacity: d.paid ? 0.7 : 1,
         }}>
      {/* Checkbox de pago — grande e óbvio */}
      <button onClick={onTogglePaid}
              title={d.paid ? "Marcar como pendente" : "Dar baixa (marcar como pago)"}
              className="shrink-0 transition hover:scale-110">
        {d.paid
          ? <CheckCircle2 size={22} className="text-emerald-400" />
          : overdue
            ? <AlertTriangle size={22} className="text-rose-400 hover:text-emerald-400 transition" />
            : <Circle size={22} className="text-white/30 hover:text-emerald-400 transition" />}
      </button>

      {/* Descrição + meta */}
      <div className="min-w-0 flex-1">
        <div className={`font-medium truncate ${d.paid ? "line-through text-white/50" : ""}`}>
          {d.description || "—"}
        </div>
        <div className="text-xs flex items-center gap-2 flex-wrap mt-0.5"
             style={{ color: "rgba(255,255,255,0.45)" }}>
          {overdue && (
            <span className="px-1.5 py-0.5 rounded font-medium flex items-center gap-1"
                  style={{ background: accents.rose.soft, color: accents.rose.hex }}>
              <AlertTriangle size={10} /> atrasada
            </span>
          )}
          {dueToday && (
            <span className="px-1.5 py-0.5 rounded font-medium flex items-center gap-1"
                  style={{ background: accents.amber.soft, color: accents.amber.hex }}>
              <Bell size={10} /> vence hoje
            </span>
          )}
          {d.dueDay && !overdue && !dueToday && (
            <span className="flex items-center gap-1">
              <Calendar size={10} /> dia {d.dueDay}
            </span>
          )}
          {d.installmentTotal > 1 && (
            <span className="px-1.5 py-0.5 rounded bg-white/5 text-white/55 tabular-nums">
              parcela {d.installmentCurrent}/{d.installmentTotal}
            </span>
          )}
          {catObj && catA && (
            <span className="px-1.5 py-0.5 rounded" style={{ background: catA.soft, color: catA.hex }}>
              {d.category}
            </span>
          )}
          {d.attributedTo && attA && (
            <span className="px-1.5 py-0.5 rounded" style={{ background: attA.soft, color: attA.hex }}>
              {d.attributedTo}
            </span>
          )}
        </div>
      </div>

      {/* Forma de pagamento (se houver) — destaque visual */}
      {d.paymentMethod && (
        <div className="shrink-0 hidden sm:block">
          <span className="text-xs px-2 py-1 rounded inline-flex items-center gap-1"
                style={{ background: pmA.soft, color: pmA.hex, border: `1px solid ${pmA.hex}25` }}>
            {cardObj ? <CreditCard size={11} /> : <Banknote size={11} />}
            {d.paymentMethod}
          </span>
        </div>
      )}

      {/* Valor */}
      <div className="shrink-0 text-right">
        <div style={{ fontFamily: "JetBrains Mono, monospace" }}
             className={`tabular-nums font-semibold whitespace-nowrap ${d.paid ? "text-white/55" : ""}`}>
          {fmtBRL(d.amount)}
        </div>
        <div className="text-xs sm:hidden mt-0.5">
          {d.paymentMethod && (
            <span style={{ color: pmA.hex }}>{d.paymentMethod}</span>
          )}
        </div>
      </div>

      {/* Ações */}
      <div className="shrink-0 flex gap-0.5">
        <button onClick={onEdit} className="p-1.5 rounded text-white/40 hover:text-amber-300 hover:bg-white/5 transition"
                title="Editar">
          <Pencil size={13} />
        </button>
        <button onClick={onRemove} className="p-1.5 rounded text-white/40 hover:text-rose-400 hover:bg-white/5 transition"
                title="Remover">
          <Trash2 size={13} />
        </button>
      </div>
    </div>
  );
}

function DespesaForm({ config, initial, onSubmit, onCancel, isEditing = false, currentMonth }) {
  const firstAttr = config.attributedTo[0]?.name || "";
  const [d, setD] = useState(initial || {
    description: "", amount: "", date: todayISO(),
    category: "",
    paymentMethod: "",
    attributedTo: firstAttr,
    paid: true,
    dueDay: "",
    installmentCurrent: 1, installmentTotal: 1,
    recurring: false,
  });

  // Modo do gasto: à vista, parcelado ou recorrente. Determina parte da estrutura.
  const initialMode = initial
    ? (initial.recurring ? "recorrente" : Number(initial.installmentTotal) > 1 ? "parcelado" : "avista")
    : "avista";
  const [mode, setMode] = useState(initialMode);

  const onChangeMode = (m) => {
    setMode(m);
    setD(prev => ({
      ...prev,
      recurring: m === "recorrente",
      installmentTotal: m === "parcelado" ? Math.max(2, Number(prev.installmentTotal) || 2) : 1,
      installmentCurrent: m === "parcelado" ? Math.max(1, Number(prev.installmentCurrent) || 1) : 1,
    }));
  };

  // Auto-preenche dueDay e ajusta paid quando troca o método de pagamento
  const setPayment = (v) => {
    setD(prev => {
      const cardDue = cardDueDayFor(v, config);
      const wasCard = cardDueDayFor(prev.paymentMethod, config) != null;
      const isCard = cardDue != null;
      const next = { ...prev, paymentMethod: v };
      if (cardDue && (!prev.dueDay || cardDueDayFor(prev.paymentMethod, config) === Number(prev.dueDay))) {
        next.dueDay = String(cardDue);
      }
      if (isCard && !wasCard) next.paid = false;
      if (!isCard && wasCard) next.paid = true;
      return next;
    });
  };

  const submit = () => {
    if (!d.description || !d.amount) return;
    onSubmit({
      ...d,
      amount: Number(d.amount),
      dueDay: d.dueDay === "" ? null : Number(d.dueDay),
      recurring: mode === "recorrente",
      installmentCurrent: mode === "parcelado" ? Number(d.installmentCurrent) || 1 : 1,
      installmentTotal: mode === "parcelado" ? Number(d.installmentTotal) || 1 : 1,
    });
  };

  const isParcelado = mode === "parcelado";
  const isRecorrente = mode === "recorrente";
  const totalParc = Number(d.installmentTotal) || 1;
  const curParc = Number(d.installmentCurrent) || 1;
  const valorParc = Number(d.amount) || 0;
  const totalCompra = valorParc * totalParc;

  const attrObj = config.attributedTo.find(a => a.name === d.attributedTo);
  const isMine = attrObj ? attrObj.isMine !== false : true;

  const chosenCard = config.cards.find(c => c.name === d.paymentMethod);
  const cardDue = chosenCard?.dueDay ? Number(chosenCard.dueDay) : null;
  const cardNames = config.cards.map(c => c.name);

  // Toggle "Já pago" só faz sentido quando: tem método à vista (não cartão) e não é parcelado
  const showJaPago = d.paymentMethod && !chosenCard && !isParcelado;

  const valorLabel = isParcelado ? "Valor da parcela" : "Valor";

  return (
    <div className="rounded-xl bg-white/5 border border-white/10 mb-4 p-4 sm:p-5 space-y-4">
      {!isEditing && (
        <div className="flex items-center gap-2.5">
          <div style={{ background: "rgba(212,175,55,0.15)", color: "#d4af37" }}
               className="p-1.5 rounded-lg shrink-0">
            <Plus size={14} />
          </div>
          <div className="min-w-0">
            <div className="text-sm font-semibold">Novo gasto</div>
            <div className="text-xs text-white/45">Aluguel, mercado, presente, parcela…</div>
          </div>
        </div>
      )}

      {/* 1. Tipo do gasto — segmented control no topo */}
      <ModePicker value={mode} onChange={onChangeMode}
                  options={[
                    { value: "avista",     label: "À vista",     description: "Pago tudo de uma vez (Pix, débito, cartão)", accent: "emerald", icon: Banknote   },
                    { value: "parcelado",  label: "Parcelado",   description: "Dividido em parcelas mensais (cartão)",      accent: "cyan",    icon: Receipt    },
                    { value: "recorrente", label: "Gasto fixo",  description: "Repete todo mês (aluguel, assinaturas)",     accent: "violet",  icon: Calendar   },
                  ]} />

      {/* 2. Orçamento (opcional) — chips */}
      {config.categories.length > 0 ? (
        <Field label="Orçamento" hint="opcional">
          <div className="flex flex-wrap gap-1.5">
            {config.categories.map(c => (
              <Chip key={c.name}
                    selected={d.category === c.name}
                    onClick={() => setD({ ...d, category: d.category === c.name ? "" : c.name })}
                    accent={c.accent}>
                {c.name}
              </Chip>
            ))}
          </div>
        </Field>
      ) : null}

      {/* 3. Descrição */}
      <Field label="O que foi?">
        <TextInput value={d.description} onChange={v => setD({ ...d, description: v })}
                   placeholder="Ex: Mercado da semana, FIFA, Presente Ju" />
      </Field>

      {/* 4. Forma de pagamento — chips */}
      {config.paymentMethods.length > 0 ? (
        <Field label="Forma de pagamento" hint={chosenCard && cardDue ? `vence dia ${cardDue}` : null}>
          <div className="flex flex-wrap gap-1.5">
            {config.paymentMethods.map(pm => {
              const card = config.cards.find(c => c.name === pm);
              const accent = card?.accent
                || (pm === "Pix" ? "emerald"
                    : pm === "Débito" ? "sky"
                    : hashAccent(pm));
              const isCard = cardNames.includes(pm);
              return (
                <Chip key={pm}
                      selected={d.paymentMethod === pm}
                      onClick={() => setPayment(d.paymentMethod === pm ? "" : pm)}
                      accent={accent}
                      icon={isCard ? CreditCard : Banknote}>
                  {pm}
                </Chip>
              );
            })}
          </div>
        </Field>
      ) : (
        <Field label="Forma de pagamento" hint="cadastre nas Configurações">
          <div className="text-xs text-white/40 italic py-1">— nenhum método —</div>
        </Field>
      )}

      {/* 5. Valor (+ Data) — com R$ prefix e preview formatado */}
      <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
        <Field label={valorLabel}>
          <MoneyInput value={d.amount} onChange={v => setD({ ...d, amount: v })} />
        </Field>
        <Field label="Data" hint="toque pra abrir o calendário">
          <TextInput type="date" value={d.date} onChange={v => setD({ ...d, date: v })}
                     style={{ fontSize: 14, textAlign: "center", padding: "10px 8px" }} />
        </Field>
      </div>

      {/* 5b. Box de parcelas — só se parcelado */}
      {isParcelado && (
        <div className="p-3 sm:p-4 rounded-lg space-y-3"
             style={{ background: "rgba(6,182,212,0.08)", border: "1px solid rgba(6,182,212,0.25)" }}>
          <div className="text-xs text-white/70 flex items-center gap-1.5">
            <Sparkles size={12} className="text-cyan-300" />
            Em qual parcela você está?
          </div>
          <div className="grid grid-cols-2 gap-3">
            <Field label="Parcela atual">
              <TextInput type="number" value={d.installmentCurrent}
                         onChange={v => setD({ ...d, installmentCurrent: v })}
                         placeholder="1" />
            </Field>
            <Field label="De quantas">
              <TextInput type="number" value={d.installmentTotal}
                         onChange={v => setD({ ...d, installmentTotal: v })}
                         placeholder="2" />
            </Field>
          </div>
          {totalCompra > 0 && (
            <div className="text-xs text-white/65">
              Total da compra: <strong className="text-white/90">{fmtBRL(totalCompra)}</strong>
              <span className="text-white/35"> ({totalParc}× {fmtBRL(valorParc)})</span>
            </div>
          )}
          {!isEditing && curParc < totalParc && (
            <div className="text-xs text-white/70 pt-2 border-t border-white/5">
              ✨ Vou criar as <strong>{totalParc - curParc} parcela(s)</strong> seguintes de {fmtBRL(valorParc)} nos próximos meses.
            </div>
          )}
        </div>
      )}

      {/* 5c. Aviso de cartão — só lembrete do vencimento */}
      {chosenCard && cardDue && (
        <div className="rounded-lg p-3"
             style={{
               background: `${accents[chosenCard.accent]?.soft || "rgba(212,175,55,0.10)"}`,
               border: `1px solid ${accents[chosenCard.accent]?.hex || accents.gold.hex}25`,
             }}>
          <div className="text-xs flex items-start gap-2 text-white/75">
            <CreditCard size={13} className="mt-0.5 shrink-0"
                        style={{ color: accents[chosenCard.accent]?.hex }} />
            <div className="min-w-0">
              Cartão <strong className="text-white/90">{chosenCard.name}</strong> · fatura vence dia <strong className="text-white/90">{cardDue}</strong>
            </div>
          </div>
        </div>
      )}

      {/* 6. Atribuído a — chips */}
      {config.attributedTo.length > 0 && (
        <Field label="Atribuído a"
               hint={!isMine && d.attributedTo ? "vai pra A receber" : null}>
          <div className="flex flex-wrap gap-1.5">
            {config.attributedTo.map(a => {
              const accent = hashAccent(a.name);
              const sel = d.attributedTo === a.name;
              const third = a.isMine === false;
              return (
                <Chip key={a.name}
                      selected={sel}
                      onClick={() => setD({ ...d, attributedTo: sel ? "" : a.name })}
                      accent={third ? "amber" : accent}>
                  {third ? "🤝 " : ""}{a.name}
                </Chip>
              );
            })}
          </div>
        </Field>
      )}

      {/* 7. Já pago (só quando faz sentido) + dia de vencimento */}
      <div className="space-y-3">
        {showJaPago && (
          <div>
            <Toggle checked={!!d.paid}
                    onChange={v => setD({ ...d, paid: v })}
                    accent="emerald">
              Já pago
            </Toggle>
          </div>
        )}
        <Field label="Dia do mês que vence" hint="opcional · só o dia (1–31)">
          <TextInput type="number"
                     inputMode="numeric"
                     value={d.dueDay}
                     onChange={v => setD({ ...d, dueDay: v })}
                     placeholder={cardDue ? `Ex: ${cardDue}` : "Ex: 5"}
                     style={{ maxWidth: 140 }} />
        </Field>
      </div>

      {/* Botões */}
      <div className="flex gap-2 justify-end pt-3 border-t border-white/5">
        {onCancel && <Btn variant="ghost" onClick={onCancel} icon={X}>Cancelar</Btn>}
        <Btn onClick={submit} icon={Check} disabled={!d.description || !d.amount}>Salvar</Btn>
      </div>
    </div>
  );
}

  const add = () => {
    if (!draft.amount || !draft.source) return;
    setMonth(m => ({ ...m, receitas: [...m.receitas, { id: uid(), ...draft, amount: Number(draft.amount) }] }));

        <SectionTitle
          icon={Wallet}
          title="Entradas do mês"
          subtitle={`${month.receitas.length} registro(s)`}
          accent="emerald"
          action={<Btn icon={Plus} onClick={() => setAdding(!adding)}>{adding ? "Cancelar" : "Adicionar"}</Btn>}
