name: Agenda Reminders

# Dispara o endpoint /api/agenda-reminders a cada 5 minutos pra mandar
# lembretes do Alfred. Usamos GitHub Actions porque Vercel Hobby só
# permite cron 1x/dia.

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:  # permite rodar manualmente pelo botão

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Chamar endpoint de lembretes
        run: |
          curl -sS -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            -w "\nHTTP: %{http_code}\n" \
            https://meudomus.com/api/agenda-reminders
